name: Reusable Docker

on:
  workflow_call:
    inputs:
      package-name:
        description: "Package name for the Docker image (defaults to repository name)"
        type: string
        required: false
      submodules:
        description: "Whether to checkout submodules: false, true, or recursive"
        type: string
        default: "false"
      platforms:
        description: "Comma-separated platforms to build. Each platform builds on a native runner (linux/arm64* -> ubuntu-24.04-arm, everything else -> ubuntu-24.04), so no QEMU emulation is used."
        type: string
        default: "linux/amd64,linux/arm64"
      dockerfile:
        description: "Path to the Dockerfile"
        type: string
        default: "./Dockerfile"
      context:
        description: "Docker build context"
        type: string
        default: "."
      free-disk-space:
        description: "Whether to free disk space before building"
        type: boolean
        default: false
      cache-backend:
        description: "Build cache backend: 'gha' (GitHub Actions cache, ~10GB/repo limit) or 'registry' (stored in GHCR, unbounded and cross-branch). Use 'registry' for repos that build many or large images."
        type: string
        default: "gha"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor != 'dependabot[bot]'
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      image: ${{ steps.image.outputs.image }}
      scope: ${{ steps.image.outputs.scope }}
    steps:
      - name: Resolve image reference
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ inputs.package-name }}
          REPO: ${{ github.event.repository.name }}
        run: |
          name="${PACKAGE:-$REPO}"
          image="ghcr.io/${OWNER}/${name}"
          echo "image=${image,,}" >> "$GITHUB_OUTPUT"
          echo "scope=${name,,}" >> "$GITHUB_OUTPUT"

      - name: Compute per-platform runner matrix
        id: matrix
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          entries=()
          IFS=',' read -ra parts <<< "$PLATFORMS"
          for raw in "${parts[@]}"; do
            platform="$(echo "$raw" | xargs)"
            [ -z "$platform" ] && continue
            case "$platform" in
              linux/arm64*) runner="ubuntu-24.04-arm" ;;
              *) runner="ubuntu-24.04" ;;
            esac
            key="${platform//\//-}"
            entries+=("{\"platform\":\"${platform}\",\"runner\":\"${runner}\",\"key\":\"${key}\"}")
          done
          printf -v joined '%s,' "${entries[@]}"
          echo "matrix={\"include\":[${joined%,}]}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      REGISTRY_IMAGE: ${{ needs.prepare.outputs.image }}
    steps:
      - name: Free disk space
        if: ${{ inputs.free-disk-space }}
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          submodules: ${{ inputs.submodules }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: ${{ inputs.cache-backend == 'registry' && format('type=registry,ref={0}:buildcache-{1}', env.REGISTRY_IMAGE, matrix.key) || format('type=gha,scope={0}-{1}', needs.prepare.outputs.scope, matrix.key) }}
          cache-to: ${{ inputs.cache-backend == 'registry' && format('type=registry,mode=max,ref={0}:buildcache-{1}', env.REGISTRY_IMAGE, matrix.key) || format('type=gha,mode=max,scope={0}-{1}', needs.prepare.outputs.scope, matrix.key) }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.key }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & push manifest
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REGISTRY_IMAGE: ${{ needs.prepare.outputs.image }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${REGISTRY_IMAGE}@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ steps.meta.outputs.version }}"
