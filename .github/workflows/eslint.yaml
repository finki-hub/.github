name: Reusable ESLint

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "lts/*"
      working-directory:
        description: "Directory to run commands in"
        type: string
        default: "."

permissions:
  contents: read

concurrency:
  group: eslint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Register ESLint problem matcher
        uses: finki-hub/.github/.github/actions/problem-matchers@main
        with:
          tool: eslint

      - name: Run ESLint
        run: npm run lint
