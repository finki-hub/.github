name: Reusable Cloudflare Pages

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "lts/*"
      working-directory:
        description: "Working directory for the Pages project"
        type: string
        default: "."
      project-name:
        description: "Cloudflare Pages project name"
        type: string
        required: true
      directory:
        description: "Output directory to deploy"
        type: string
        default: "dist"
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

permissions:
  contents: read

concurrency:
  group: cf-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        env:
          # Public PostHog ingest key; set the org/repo Actions variable to enable, unset = analytics off.
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ inputs.working-directory }}/${{ inputs.directory }} --project-name=${{ inputs.project-name }}
